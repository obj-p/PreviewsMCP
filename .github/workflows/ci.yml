name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit lands on the same ref.
# Saves macos-15 minutes on rapid PR pushes (the iOS test step alone
# burns ~20 minutes per attempt). The release workflow is tag-driven
# and lives on a separate ref, so it is not affected by this group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/Cask
          key: brew-${{ runner.os }}-${{ hashFiles('Brewfile') }}
          restore-keys: brew-${{ runner.os }}-

      - name: Install tools
        run: brew bundle

      - name: Check formatting
        run: swift-format lint --strict --recursive Sources/ Tests/ examples/

      - name: SwiftLint
        run: swiftlint lint --quiet Sources/ Tests/

  changes:
    runs-on: macos-15
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'Sources/**'
              - 'Tests/**'
              - 'Package.swift'
              - 'Package.resolved'
              - 'examples/**'
            ios:
              - 'Sources/PreviewsIOS/**'
              - 'Sources/SimulatorBridge/**'
              - 'Sources/PreviewsCore/**'
              - 'Sources/PreviewsCLI/**'
              - 'Tests/PreviewsIOSTests/**'
              - 'Tests/MCPIntegrationTests/**'
              - 'Package.swift'
              - 'Package.resolved'

  build-and-test:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: macos-15
    env:
      PREVIEWSMCP_SOCKET_DIR: /tmp/previewsmcp-ci-build
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Disable Spotlight
        run: sudo mdutil -a -i off

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            examples/spm/.build
          key: spm-${{ runner.os }}-build-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-build-
            spm-${{ runner.os }}-

      - name: Build
        run: swift build

      - name: Pre-build SPM example
        run: swift build --package-path examples/spm

      - name: Unit tests
        env:
          NSUnbufferedIO: "YES"
        run: swift test --filter "PreviewsCoreTests"

      - name: CLI integration tests
        # 15m > per-test .timeLimit(.minutes(5)) so test-level timeouts fire
        # first with a source-located Testing error instead of a bare GHA
        # step kill. Warm-cache local wall-clock is ~3 min for 61 tests;
        # 15m leaves substantial headroom for cold caches and one or two
        # localized timeouts. See issue #127 for context.
        timeout-minutes: 15
        env:
          NSUnbufferedIO: "YES"
        run: >-
          swift test --filter "CLIIntegrationTests"
          --skip "snapshotIOS"
          --skip "iosCLIWorkflow"

      - name: Dump daemon log on CLI test failure
        if: failure()
        run: |
          echo "--- daemon log ($PREVIEWSMCP_SOCKET_DIR/serve.log) ---"
          cat "$PREVIEWSMCP_SOCKET_DIR/serve.log" 2>/dev/null || echo "(no log file)"
          echo "--- socket dir listing ---"
          ls -la "$PREVIEWSMCP_SOCKET_DIR/" 2>/dev/null || echo "(dir not found)"

      - name: MCP integration tests
        # 30m > longest per-test .timeLimit (.minutes(20), previewVariants)
        # so test-level timeouts fire first with source-located Testing
        # errors instead of bare GHA step kills. previewVariants was
        # bumped from 10m → 20m to absorb observed CI variance where
        # parallel macos-15 runners slowed swift build + variant renders
        # enough to blow through the old 10m budget.
        timeout-minutes: 30
        env:
          NSUnbufferedIO: "YES"
        run: swift test --filter "MCPIntegrationTests" --skip "IOSMCPTests"

      - name: Dump MCP server stderr on failure
        if: failure()
        run: |
          echo "--- MCPTestServer per-instance stderr logs ---"
          for f in "$TMPDIR"/previewsmcp-test-*.log /tmp/previewsmcp-test-*.log; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            cat "$f"
            echo
          done
          echo "--- daemon log ($PREVIEWSMCP_SOCKET_DIR/serve.log) ---"
          cat "$PREVIEWSMCP_SOCKET_DIR/serve.log" 2>/dev/null || echo "(no log file)"

  ios-tests:
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-15
    env:
      PREVIEWSMCP_SOCKET_DIR: /tmp/previewsmcp-ci-ios
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Disable Spotlight
        run: sudo mdutil -a -i off

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            examples/spm/.build
          key: spm-${{ runner.os }}-ios-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-ios-
            spm-${{ runner.os }}-

      # Warm CoreSimulator daemon and device set in background while building.
      # SimServiceContext.deviceSetWithPath: takes ~10 min on cold CI VMs.
      # simctl list forces this initialization so the test binary doesn't block.
      - name: Warm CoreSimulator and build in parallel
        run: |
          echo "Starting CoreSimulator warmup in background..."
          xcrun simctl list devices available &
          SIMCTL_PID=$!

          swift build
          swift build --package-path examples/spm

          echo "Waiting for CoreSimulator warmup to complete..."
          wait $SIMCTL_PID
          echo "CoreSimulator ready."

      - name: iOS unit tests
        timeout-minutes: 20
        env:
          NSUnbufferedIO: "YES"
        run: swift test --filter "PreviewsIOSTests"

      - name: iOS CLI snapshot test
        timeout-minutes: 10
        env:
          NSUnbufferedIO: "YES"
        run: swift test --filter "snapshotIOS"

      - name: Kill stale daemon before iOS CLI tests
        run: .build/debug/previewsmcp kill-daemon --timeout 3 || true

      - name: iOS CLI integration tests
        timeout-minutes: 20
        env:
          NSUnbufferedIO: "YES"
        run: swift test --filter "iosCLIWorkflow"

      - name: Dump daemon log on failure
        if: failure()
        run: |
          echo "--- daemon log ($PREVIEWSMCP_SOCKET_DIR/serve.log) ---"
          cat "$PREVIEWSMCP_SOCKET_DIR/serve.log" 2>/dev/null || echo "(no log file)"
          echo "--- socket dir listing ---"
          ls -la "$PREVIEWSMCP_SOCKET_DIR/" 2>/dev/null || echo "(dir not found)"

      - name: Reset CoreSimulator state before iOS MCP tests
        # Observed on PR #141 CI: by the time iOS MCP tests runs, the
        # same simulator device that passed PreviewsIOSTests.endToEnd
        # earlier in the job is wedged — `xcrun simctl launch` hangs
        # indefinitely with empty stderr, even after shutdown + reboot.
        # The CoreSimulator service accumulates state across the prior
        # iOS steps (unit tests, CLI snapshot, CLI integration) that
        # it doesn't recover from. Forcibly tearing down every booted
        # device + bouncing the service gives MCP tests a clean slate.
        run: |
          xcrun simctl shutdown all 2>&1 || true
          killall -9 "Simulator" "com.apple.CoreSimulator.CoreSimulatorService" 2>&1 || true
          sleep 3
          # Give the service time to come back up before the next step's
          # swift test triggers it.
          xcrun simctl list devices > /dev/null 2>&1 || true

      - name: iOS MCP tests
        # 35m = 5m build + 25.5m tests (simulator_list 25s + fullIOS 20m
        # .timeLimit + 5m buffer). The previous 25m budget was 14
        # seconds too tight on PR #141 CI: swift test compile ate 5m
        # and the step killed fullIOSWorkflow mid-run at t=19:46,
        # before Swift Testing's 20m .timeLimit could fire a
        # source-located issue.
        timeout-minutes: 35
        env:
          NSUnbufferedIO: "YES"
        run: swift test --filter "IOSMCPTests"

      - name: Dump iOS MCP server stderr on failure
        if: failure()
        run: |
          echo "--- MCPTestServer per-instance stderr logs ---"
          for f in "$TMPDIR"/previewsmcp-test-*.log /tmp/previewsmcp-test-*.log; do
            [ -f "$f" ] || continue
            echo "=== $f ==="
            cat "$f"
            echo
          done
          echo "--- booted simulators ---"
          xcrun simctl list devices booted 2>/dev/null || true
          echo "--- orphan simctl/previewsmcp procs ---"
          ps -o pid,command -ax | grep -E "(simctl|previewsmcp)" | grep -v grep || true
