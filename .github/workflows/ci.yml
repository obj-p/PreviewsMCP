name: CI

# TRIAL (see #355 discussion → CI-as-merge-gate direction): runs as a
# non-required signal while we collect flake/wall-clock data. Do not make
# this a required check until it has a green track record.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bazel:
    runs-on: macos-15
    # Cold Bazel builds compile LLVM from source; the disk-cache restore
    # makes warm runs the normal case. Generous cap while the trial
    # measures real wall clock.
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      # Must match the .bazelrc --xcode_version pin, and puts xcrun/simctl
      # (which the sim-booting tests shell out to) on the same Xcode. The
      # macos-15 image bundles the iOS 26.2 simulator runtime for this
      # Xcode, so SimulatorTestDevices can create its previewsmcp-test-N
      # iPhone 17 devices on a fresh runner.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      # Simulator-heavy suites are sensitive to background I/O load.
      - name: Disable Spotlight
        run: sudo mdutil -a -i off

      - name: Cache Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel-disk
          key: bazel-disk-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock') }}
          restore-keys: bazel-disk-${{ runner.os }}-

      - name: Test
        run: bazel test //... --test_output=errors

      - name: Lint
        run: bazel run //tools/lint:check
