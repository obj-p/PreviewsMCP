name: CI

# Runs on the self-hosted Mac mini runner (hosted macos-15 runners measured
# 50-70 min warm vs ~5-7 min local; see PR #361). On-demand label gate: the
# `ci` job is the required status check and runs only when a `ci` or `merge`
# label is applied to a PR, never automatically on push. `merge` also arms
# GitHub auto-merge, which lands the PR (squash) once `ci` is green and the
# branch is up to date. See docs/ci.md for the flow.
#
# The runner host provides: Xcode 26.2 (the .bazelrc --xcode_version pin) with
# the iOS 26.2 simulator runtime, bazelisk, and a persistent
# ~/.cache/bazel-disk (so no actions/cache step — the disk cache never leaves
# the machine). Spotlight indexing disabled once at host setup.

on:
  # On-demand only: adding the `ci` (test) or `merge` (test + auto-merge) label
  # to a PR fires this. No push/pull_request-sync trigger, so a WIP push never
  # spends a run — you label when you are ready. The required-check + "require
  # branches up to date" ruleset makes the labeled run test the merged result.
  pull_request:
    types: [labeled]
  schedule:
    # Weekly heartbeat (Sunday 05:00 UTC): catches toolchain/host drift on the
    # runner while the repo is quiet, and doubles as a standing flake probe.
    # Matters more under on-demand CI, where the suite can sit idle for days.
    - cron: "0 5 * * 0"
  workflow_dispatch:

# No `concurrency` / cancel-in-progress on purpose: cancelling an in-progress
# run SIGKILLs xcodebuild/simctl/previewsmcp mid-flight and LEAKS booted sims +
# orphan daemon/agent/xctest procs that accumulate across runs, degrade the
# shared CoreSimulator, and wedge the heaviest target (the MCPIntegrationTests
# 3600s timeout; the confirmed #391 trigger). Label-gating already means a push
# never starts a run, so there is nothing to auto-cancel. Do not re-add it.

jobs:
  # Arm GitHub auto-merge the moment `merge` is applied, on a hosted runner so
  # it happens instantly regardless of the mini's queue. Auto-merge waits for
  # the required `ci` check and an up-to-date branch, then squash-merges.
  arm-merge:
    if: github.event_name == 'pull_request' && github.event.label.name == 'merge'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --auto --squash

  ci:
    # The required status check. Runs on the `ci` label (test only) and the
    # `merge` label (test + arm-merge lands it), plus the weekly heartbeat and
    # manual dispatch. Renamed from `bazel`; the ruleset requires context `ci`.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'ci' ||
      github.event.label.name == 'merge'
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 120
    permissions:
      contents: read
      checks: read
    env:
      # Pins xcrun/simctl (which the sim-booting tests shell out to) to the
      # same Xcode as the Bazel pin, without mutating the host's global
      # xcode-select.
      DEVELOPER_DIR: /Applications/Xcode-26.2.0.app/Contents/Developer
      # Required-gate iOS-coverage signal. The "Assert iOS-coverage signal"
      # step reads it here (runner shell); the Bazel test steps propagate it into
      # bazel's scrubbed sandbox via .bazelrc --test_env so
      # SimulatorTestDevices.requiresDedicatedSim is true → a nil provision
      # FAILS the gate instead of silently skipping iOS coverage.
      PREVIEWSMCP_REQUIRE_DEDICATED_SIM: "1"
    steps:
      # Dedup (label `ci` then `merge`): if `merge` lands on a commit the `ci`
      # label already turned green, skip the suite. This job still runs and
      # reports `ci` success (a real conclusion, never a skipped-context that
      # would block the required check), so auto-merge proceeds without a second
      # full run. `merge` on an untested commit finds no green check and runs.
      - name: Skip suite if this commit is already green
        id: dedup
        if: github.event_name == 'pull_request' && github.event.label.name == 'merge'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/check-runs" \
               --jq '.check_runs[] | select(.name=="ci" and .conclusion=="success") | .id' \
               | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "A green ci check already exists for $SHA — skipping the suite."
          fi

      - if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v7

      # Start from a clean host. A cancelled or timed-out prior run can leave a
      # booted simulator, a wedged CoreSimulatorService, and orphaned previewsmcp
      # daemons behind — that leftover state degrades the next run and is the
      # confirmed #391 trigger. Reap it before Lint/Test so every run starts
      # clean.
      #
      # `killall Simulator` is first and load-bearing: a Simulator.app left
      # holding a device keeps it booted, and `simctl shutdown all` alone can
      # NOT clear a service that has wedged below simctl's reach (observed —
      # a "success" shutdown that left the device booted). Killing the app,
      # then shutting the devices, then kicking the service restores it.
      # `killall`/`pkill 'previewsmcp serve'` match process names, never the
      # runner's own checkout path; every line is best-effort.
      - name: Reset simulator and daemon state
        if: steps.dedup.outputs.skip != 'true'
        run: |
          # Reap orphaned procs a prior cancelled/timed-out run leaked — a
          # `previewsmcp run`/`serve`, its spawned PreviewAgent, or an orphan
          # test bundle keeps a sim session / degrades CoreSimulator and is
          # what wedges MCPIntegrationTests. Patterns are TARGETED, never a
          # broad `-f previewsmcp`: `bazel test //previewsmcp/...` carries the
          # package path in bazel's own argv, so a broad match would kill the
          # live run.
          pkill -9 -f 'previewsmcp serve' || true
          pkill -9 -f 'previewsmcp run' || true
          pkill -9 -x PreviewAgent || true
          pkill -9 -f '\.xctest' || true
          killall -9 Simulator || true
          xcrun simctl shutdown all || true
          launchctl kickstart -k "gui/$(id -u)/com.apple.CoreSimulator.CoreSimulatorService" 2>/dev/null \
            || launchctl kickstart -k "system/com.apple.CoreSimulator.CoreSimulatorService" 2>/dev/null || true
          # `delete unavailable` only — never `erase`/`delete all`, which would
          # unpin the previewsmcp-test-N devices and make provisioning fail-loud.
          xcrun simctl delete unavailable || true

      # Lint first: it costs seconds and fails fast before the minutes of tests.
      - name: Lint
        if: steps.dedup.outputs.skip != 'true'
        run: bazel run //tools/lint:check

      # Drift guard (runs in the runner shell, OUTSIDE bazel's scrubbed test
      # env, so the job-level var IS visible here): if the required-gate
      # iOS-coverage signal is ever dropped from the job env, fail loudly
      # instead of letting the guard go silently inert. Coupled with
      # SimulatorTestDevices.requiresDedicatedSim + the .bazelrc
      # `--test_env=PREVIEWSMCP_REQUIRE_DEDICATED_SIM` line.
      - name: Assert iOS-coverage signal is set
        if: steps.dedup.outputs.skip != 'true'
        run: |
          test -n "$PREVIEWSMCP_REQUIRE_DEDICATED_SIM" || {
            echo "PREVIEWSMCP_REQUIRE_DEDICATED_SIM must be set (job env) so the required gate FAILS — not silently skips — when a dedicated simulator can't be provisioned. See SimulatorTestDevices.requiresDedicatedSim + .bazelrc --test_env."
            exit 1
          }

      # Run in-process tests first so a fast failure does not spend time on the
      # simulator/daemon/agent tier. Both steps belong to the required `ci` job,
      # so both must pass before a PR can merge.
      - name: Test (unit)
        if: steps.dedup.outputs.skip != 'true'
        run: bazel test //... --test_tag_filters=-integration --test_output=errors

      - name: Test (integration)
        if: steps.dedup.outputs.skip != 'true'
        # The job-level PREVIEWSMCP_REQUIRE_DEDICATED_SIM reaches bazel's
        # scrubbed test env via the .bazelrc --test_env line, so a nil
        # provision FAILS on the required gate instead of skip-as-green.
        run: bazel test //... --test_tag_filters=integration --test_output=errors

      # The state a flake leaves behind (booted sims, orphan daemons, the
      # per-run daemon logs #350 collects specimens from) persists on the
      # self-hosted host but can be mutated by the next run — capture it in
      # this run's log while it is still true.
      - name: Failure diagnostics
        if: failure()
        run: |
          xcrun simctl list devices booted || true
          pgrep -fl "previewsmcp|simctl" || true
          for f in "${TMPDIR:-/tmp}"previewsmcp-test-*.log /tmp/previewsmcp-test-*.log; do
            [ -f "$f" ] && { echo "=== $f (tail)"; tail -100 "$f"; }
          done || true

      # Reap this run's OWN leftovers even on success — a passed run can still
      # leave a detached daemon/agent (spawned to outlive its CLI) or a booted
      # sim. Runs after the diagnostics step so a failure capture sees the live
      # state first. Same targeted reaps as the start-of-job reset.
      - name: Reap leaked processes and simulators
        if: always()
        run: |
          pkill -9 -f 'previewsmcp serve' || true
          pkill -9 -f 'previewsmcp run' || true
          pkill -9 -x PreviewAgent || true
          pkill -9 -f '\.xctest' || true
          killall -9 Simulator || true
          xcrun simctl shutdown all || true

  # Non-required signal for the regress-matrix rows that need fixture artifact
  # generation, a Bazel fetch of a fixture's pinned rules, or an iOS simulator
  # (//previewsmcp/Tests/CLIIntegrationTests:RegressToolGuardTests, tagged
  # `manual` so the required `ci` job's `//...` expansion never runs it). Runs
  # on the same triggers to build a standing flake record; promote into the
  # required gate by dropping the `manual` tag once that record is clean. This
  # check is NOT in the ruleset's required contexts — a red here never blocks
  # auto-merge. `needs: ci` keeps the single serial runner working the required
  # gate first, so this job never delays a merge.
  regress-tools:
    needs: ci
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'ci' ||
      github.event.label.name == 'merge'
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    permissions:
      contents: read
      checks: read
    env:
      DEVELOPER_DIR: /Applications/Xcode-26.2.0.app/Contents/Developer
      # Same required-gate coverage signal as `ci`: a host that cannot
      # provision the dedicated simulator (or is missing bazel) FAILS the row
      # instead of silently skipping it (RegressToolGuardTests.requireTool /
      # SimulatorTestDevices.requiresDedicatedSim).
      PREVIEWSMCP_REQUIRE_DEDICATED_SIM: "1"
    steps:
      # Dedup like `ci`: a `merge` label after a green `ci`-label run skips
      # the second identical pass.
      - name: Skip suite if this commit is already green
        id: dedup
        if: github.event_name == 'pull_request' && github.event.label.name == 'merge'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/check-runs" \
               --jq '.check_runs[] | select(.name=="regress-tools" and .conclusion=="success") | .id' \
               | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "A green regress-tools check already exists for $SHA — skipping the suite."
          fi

      - if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v7

      # Same clean-host reset as `ci` — this job boots simulators too.
      - name: Reset simulator and daemon state
        if: steps.dedup.outputs.skip != 'true'
        run: |
          pkill -9 -f 'previewsmcp serve' || true
          pkill -9 -f 'previewsmcp run' || true
          pkill -9 -x PreviewAgent || true
          pkill -9 -f '\.xctest' || true
          killall -9 Simulator || true
          xcrun simctl shutdown all || true
          launchctl kickstart -k "gui/$(id -u)/com.apple.CoreSimulator.CoreSimulatorService" 2>/dev/null \
            || launchctl kickstart -k "system/com.apple.CoreSimulator.CoreSimulatorService" 2>/dev/null || true
          xcrun simctl delete unavailable || true

      - name: Test (regress tool-guard rows)
        if: steps.dedup.outputs.skip != 'true'
        run: >-
          bazel test //previewsmcp/Tests/CLIIntegrationTests:RegressToolGuardTests
          --test_output=errors

      - name: Failure diagnostics
        if: failure()
        run: |
          xcrun simctl list devices booted || true
          pgrep -fl "previewsmcp|simctl" || true
          for f in "${TMPDIR:-/tmp}"previewsmcp-test-*.log /tmp/previewsmcp-test-*.log; do
            [ -f "$f" ] && { echo "=== $f (tail)"; tail -100 "$f"; }
          done || true

      - name: Reap leaked processes and simulators
        if: always()
        run: |
          pkill -9 -f 'previewsmcp serve' || true
          pkill -9 -f 'previewsmcp run' || true
          pkill -9 -x PreviewAgent || true
          pkill -9 -f '\.xctest' || true
          killall -9 Simulator || true
          xcrun simctl shutdown all || true
