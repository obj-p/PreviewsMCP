name: ToDo
options:
  minimumXcodeGenVersion: "2.42.0"
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
targets:
  ToDo:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: Sources/ToDo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.previewsmcp.examples.xcworkspace.todo
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
